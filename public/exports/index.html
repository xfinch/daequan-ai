<!DOCTYPE html>
<html>
<head>
    <title>Comcast CRM Exports</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover { background: #f9f9f9; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .latest { background: #e8f5e9; }
        .badge { background: #4caf50; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>📊 Comcast CRM Exports</h1>
    <p>Daily exports of all visit data from the Comcast CRM.</p>
    
    <h2>🔗 Quick Links</h2>
    <ul>
        <li><a href="latest.csv" class="latest"><strong>⬇️ Download Latest (always current)</strong></a></li>
        <li><a href="https://daequanai.com/comcast">🗺️ View Map</a></li>
    </ul>
    
    <h2>📁 Historical Exports</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>File</th>
                <th>Size</th>
            </tr>
        </thead>
        <tbody id="file-list">
            <tr>
                <td colspan="3">Loading...</td>
            </tr>
        </tbody>
    </table>
    
    <script>
        // Simple file listing - in production this would be server-generated
        fetch('/exports/')
            .then(r => r.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = [...doc.querySelectorAll('a')].filter(a => a.href.endsWith('.csv'));
                
                const tbody = document.getElementById('file-list');
                tbody.innerHTML = links.map(a => {
                    const date = a.textContent.match(/comcast_visits_(\d{4}-\d{2}-\d{2})\.csv/);
                    const dateStr = date ? date[1] : 'Unknown';
                    return `<tr>
                        <td>${dateStr}</td>
                        <td><a href="/exports/${a.textContent}">${a.textContent}</a></td>
                        <td>-</td>
                    </tr>`;
                }).join('');
            })
            .catch(() => {
                document.getElementById('file-list').innerHTML = '<tr><td colspan="3">Unable to load file list. Check directory manually.</td></tr>';
            });
    </script>
</body>
</html>
